<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G-KODE — Admin Panel</title>
    <style>
      /* ... ALL YOUR EXISTING STYLES ... */

  </head>
  <body>
    <!-- ... ALL YOUR EXISTING HTML ... -->
    <!-- (Keep everything exactly as you have it) -->

    <script>
      // ============================================
      // SUPABASE CONFIG - FIXED
      // ============================================
      const SUPABASE_URL = "https://rqvijxpbdrholshzhusb.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_lw88kFd0iSFNmkGDfczPMg_1j_ptRUO";
      let supabase = null;
      let supabaseInitialized = false;

      // ✅ NEW: Load Supabase library
      function loadSupabaseLibrary() {
        if (typeof window.supabase !== "undefined") {
          initSupabase();
          return;
        }
        const script = document.createElement("script");
        script.src =
          "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
        script.onload = function () {
          console.log("✅ Supabase library loaded (Admin)");
          initSupabase();
        };
        script.onerror = function () {
          console.warn("⚠️ Failed to load Supabase library (Admin)");
          showToast(
            "⚠️ Cloud services unavailable. Using local data.",
            "warning",
          );
        };
        document.head.appendChild(script);
      }

      function initSupabase() {
        if (supabaseInitialized) return;
        try {
          // Check if supabase is available
          if (typeof window.supabase === "undefined") {
            console.warn("⚠️ Supabase library not loaded yet");
            loadSupabaseLibrary();
            return;
          }
          supabase = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY,
          );
          supabaseInitialized = true;
          console.log("✅ Supabase connected (Admin)");
        } catch (e) {
          console.log("⚠️ Supabase not available:", e);
        }
      }

      // Load Supabase on page load
      loadSupabaseLibrary();

      // ============================================
      // ADMIN CONFIG
      // ============================================
      const ADMIN_KEY = "MAYA";
      let adminLoggedIn = false;
      let paymentEnabled = true;
      let currentAdmin = null;

      // ============================================
      // TOAST
      // ============================================
      function showToast(message, type) {
        type = type || "info";
        var container = document.getElementById("toast-container");
        if (!container) {
          container = document.createElement("div");
          container.id = "toast-container";
          container.style.cssText =
            "position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;width:90%;max-width:500px;pointer-events:none;";
          document.body.appendChild(container);
        }
        var toast = document.createElement("div");
        var colors = {
          success: "#006400",
          error: "#cc0000",
          info: "#2196F3",
          warning: "#ff9800",
        };
        toast.style.cssText =
          "padding:12px 20px;border-radius:10px;color:#fff;margin-bottom:8px;box-shadow:0 4px 15px rgba(0,0,0,0.2);background:" +
          (colors[type] || "#333") +
          ";pointer-events:auto;font-size:14px;font-weight:500;animation:slideDown 0.3s ease;";
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function () {
          toast.style.opacity = "0";
          toast.style.transition = "opacity 0.5s";
          setTimeout(function () {
            if (toast.parentNode) toast.remove();
          }, 500);
        }, 4000);
      }

      // ============================================
      // AUTHENTICATION
      // ============================================
      function adminLogin() {
        const key = document.getElementById("adminKey").value;
        if (key === ADMIN_KEY) {
          adminLoggedIn = true;
          document.getElementById("loginBox").style.display = "none";
          document.getElementById("adminPanel").classList.remove("hidden");
          // Supabase already initialized via loadSupabaseLibrary()
          loadStats();
          updatePaymentStatus();
          loadPaymentSettings();
          showToast("✅ Welcome Admin!", "success");
        } else {
          showToast("❌ Access denied", "error");
        }
      }

      function adminLogout() {
        adminLoggedIn = false;
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("adminPanel").classList.add("hidden");
        document.getElementById("adminKey").value = "";
        document.getElementById("output").innerHTML = "";
        showToast("Logged out", "info");
      }

      // ============================================
      // DATA HELPERS
      // ============================================
      function getData(key) {
        try {
          return JSON.parse(localStorage.getItem(key) || "[]");
        } catch {
          return [];
        }
      }
      function getUsersLocal() {
        return getData("gkode_users");
      }
      function getGigs() {
        return getData("gkode_gigs");
      }
      function getComplaints() {
        return getData("gkode_complaints");
      }
      function getPayments() {
        return getData("gkode_payments");
      }
      function getBusinesses() {
        return getData("gkode_companies");
      }
      function getProducts() {
        return getData("gkode_products");
      }
      function getOrders() {
        return getData("gkode_orders");
      }
      function getLogs() {
        return getData("gkode_adminLogs");
      }
      function getBackups() {
        return getData("gkode_backups");
      }

      // ============================================
      // SUPABASE USER FUNCTIONS - FIXED
      // ============================================
      async function getUsersFromSupabase() {
        if (!supabaseInitialized || !supabase) {
          console.warn("⚠️ Supabase not ready, using localStorage");
          return getUsersLocal();
        }
        try {
          const { data, error } = await supabase
            .from("users")
            .select("*")
            .order("created_at", { ascending: false });
          if (error) {
            console.error("Supabase error:", error);
            return getUsersLocal();
          }
          console.log(
            "✅ Loaded",
            data ? data.length : 0,
            "users from Supabase",
          );
          return data || [];
        } catch (e) {
          console.error("Error fetching users:", e);
          return getUsersLocal();
        }
      }

      async function updateUserInSupabase(phone, updates) {
        if (!supabaseInitialized || !supabase) {
          showToast("⚠️ Cloud unavailable. Update failed.", "error");
          return false;
        }
        try {
          const { data, error } = await supabase
            .from("users")
            .update(updates)
            .eq("phone", phone)
            .select();
          if (error) throw error;
          showToast("✅ User updated in cloud!", "success");
          return true;
        } catch (e) {
          console.error("Error updating user:", e);
          showToast("❌ Update failed: " + e.message, "error");
          return false;
        }
      }

      // ============================================
      // LOAD STATS
      // ============================================
      async function loadStats() {
        // Get users from Supabase
        const users = await getUsersFromSupabase();
        const gigs = getGigs();
        const complaints = getComplaints();
        const payments = getPayments();
        const businesses = getBusinesses();
        const products = getProducts();

        let totalRevenue = 0;
        payments.forEach(function (p) {
          if (p.verified) totalRevenue += p.amount;
        });

        document.getElementById("statUsers").textContent = users.length || 0;
        document.getElementById("statGigs").textContent = gigs.length;
        document.getElementById("statRevenue").textContent =
          "Ksh " + totalRevenue.toLocaleString();
        document.getElementById("statComplaints").textContent =
          complaints.length;
        document.getElementById("statBusinesses").textContent =
          businesses.length;
        document.getElementById("statProducts").textContent = products.length;
      }

      // ============================================
      // 👥 VIEW USERS - FROM SUPABASE!
      // ============================================
      async function viewUsers() {
        const output = document.getElementById("output");
        output.innerHTML =
          '<div style="text-align:center;padding:20px;"><div class="loader"></div><p>Loading users from cloud...</p></div>';

        const users = await getUsersFromSupabase();

        if (!users || users.length === 0) {
          output.innerHTML = "<p>No users found in cloud database.</p>";
          return;
        }

        let html =
          '<h3>👥 All Users (<span style="color:#2196F3;">' +
          users.length +
          '</span>) <span class="cloud-badge">☁️ CLOUD</span></h3>';
        html +=
          '<input type="text" id="userSearch" placeholder="Search users..." onkeyup="searchUsers()" style="margin-bottom:10px;">';
        html += '<div id="userList">';

        users.forEach(function (u) {
          const statusClass = u.is_banned
            ? "badge-banned"
            : u.is_paid
              ? "badge-paid"
              : "badge-unpaid";
          const statusText = u.is_banned
            ? "🚫 Banned"
            : u.is_paid
              ? "✅ Paid"
              : "🟡 Unpaid";

          html +=
            '<div class="user-item" data-name="' +
            (u.full_name || "").toLowerCase() +
            '" data-phone="' +
            (u.phone || "") +
            '">';
          html += '<div class="name">' + (u.full_name || "Unknown") + "</div>";
          html +=
            '<div class="phone">📞 ' +
            (u.phone || "N/A") +
            " | 🆔 " +
            (u.national_id || "N/A") +
            "</div>";
          html +=
            "<div>📍 " +
            (u.location || "N/A") +
            " | 👔 " +
            (u.profession || "N/A") +
            "</div>";
          html += "<div>📧 " + (u.email || "N/A") + "</div>";
          html +=
            "<div>⭐ " +
            (u.rating || 0) +
            " (" +
            (u.review_count || 0) +
            " reviews) | ⚠️ " +
            (u.strikes || 0) +
            " strikes</div>";
          html +=
            '<div><span class="badge ' +
            statusClass +
            '">' +
            statusText +
            "</span></div>";
          html += '<div style="margin-top:5px;">';
          if (!u.is_banned) {
            html +=
              '<button class="btn-small red" onclick="banUser(\'' +
              u.phone +
              "')\">🚫 Ban</button>";
          } else {
            html +=
              '<button class="btn-small green" onclick="unbanUser(\'' +
              u.phone +
              "')\">✅ Unban</button>";
          }
          html +=
            ' <button class="btn-small red" onclick="deleteUser(\'' +
            u.phone +
            "')\">🗑️ Delete</button>";
          html +=
            ' <button class="btn-small blue" onclick="viewUserDetails(\'' +
            u.phone +
            "')\">📋 Details</button>";
          html += "</div></div>";
        });

        html += "</div>";
        output.innerHTML = html;
      }

      // ============================================
      // VIEW CLOUD USERS (Same as viewUsers but explicit)
      // ============================================
      function viewCloudUsers() {
        viewUsers();
      }

      // ============================================
      // SEARCH USERS
      // ============================================
      function searchUsers() {
        const query = document.getElementById("userSearch").value.toLowerCase();
        const items = document.querySelectorAll(".user-item");
        items.forEach(function (item) {
          const name = item.dataset.name || "";
          const phone = item.dataset.phone || "";
          const match = name.includes(query) || phone.includes(query);
          item.style.display = match ? "block" : "none";
        });
      }

      // ============================================
      // VIEW BANNED USERS
      // ============================================
      async function viewBannedUsers() {
        const users = await getUsersFromSupabase();
        const banned = users.filter(function (u) {
          return u.is_banned;
        });
        if (banned.length === 0) {
          showToast("No banned users", "info");
          return;
        }
        displayUsers(banned, "🚫 Banned Users");
      }

      // ============================================
      // VIEW PAID USERS
      // ============================================
      async function viewPaidUsers() {
        const users = await getUsersFromSupabase();
        const paid = users.filter(function (u) {
          return u.is_paid;
        });
        if (paid.length === 0) {
          showToast("No paid users", "info");
          return;
        }
        displayUsers(paid, "✅ Paid Users");
      }

      // ============================================
      // DISPLAY USERS
      // ============================================
      function displayUsers(users, title) {
        var html = "<h3>" + title + " (" + users.length + ")</h3>";
        users.forEach(function (u) {
          html +=
            '<div class="user-item"><div class="name">' +
            (u.full_name || "Unknown") +
            "</div>";
          html += '<div class="phone">📞 ' + (u.phone || "N/A") + "</div>";
          html +=
            "<div>📍 " +
            (u.location || "N/A") +
            " | 👔 " +
            (u.profession || "N/A") +
            "</div>";
          html +=
            "<div>⭐ " +
            (u.rating || 0) +
            " | ⚠️ " +
            (u.strikes || 0) +
            " strikes</div></div>";
        });
        document.getElementById("output").innerHTML = html;
      }

      // ============================================
      // VIEW USER DETAILS
      // ============================================
      async function viewUserDetails(phone) {
        const users = await getUsersFromSupabase();
        const user = users.find(function (u) {
          return u.phone === phone;
        });
        if (!user) {
          showToast("User not found", "error");
          return;
        }

        const gigs = getGigs().filter(function (g) {
          return g.clientPhone === phone || g.workerPhone === phone;
        });
        const complaints = getComplaints().filter(function (c) {
          return c.userId === phone || c.reporterId === phone;
        });

        var html =
          "<h3>📋 User Details: " + (user.full_name || "Unknown") + "</h3>";
        html +=
          '<div class="admin-card"><p><strong>Phone:</strong> ' +
          (user.phone || "N/A") +
          "</p>";
        html +=
          "<p><strong>ID:</strong> " + (user.national_id || "N/A") + "</p>";
        html +=
          "<p><strong>Location:</strong> " + (user.location || "N/A") + "</p>";
        html +=
          "<p><strong>Profession:</strong> " +
          (user.profession || "N/A") +
          "</p>";
        html +=
          "<p><strong>Skills:</strong> " +
          ((user.skills || []).join(", ") || "None") +
          "</p>";
        html +=
          "<p><strong>Rating:</strong> ⭐ " +
          (user.rating || 0) +
          " (" +
          (user.review_count || 0) +
          " reviews)</p>";
        html +=
          "<p><strong>Strikes:</strong> ⚠️ " + (user.strikes || 0) + "</p>";
        html +=
          "<p><strong>Status:</strong> " +
          (user.is_banned
            ? "🚫 Banned"
            : user.is_paid
              ? "✅ Paid"
              : "🟡 Unpaid") +
          "</p>";
        html +=
          "<p><strong>Joined:</strong> " +
          new Date(user.created_at).toLocaleString() +
          "</p></div>";

        html += "<h4>📋 Gigs (" + gigs.length + ")</h4>";
        gigs.forEach(function (g) {
          html +=
            '<div class="user-item">' +
            g.title +
            " — " +
            g.status +
            " (" +
            g.location +
            ")</div>";
        });

        html += "<h4>🚩 Complaints (" + complaints.length + ")</h4>";
        complaints.forEach(function (c) {
          html +=
            '<div class="user-item">' +
            c.reason +
            " — " +
            (c.resolved ? "✅ Resolved" : "🟡 Pending") +
            "</div>";
        });

        document.getElementById("output").innerHTML = html;
      }

      // ============================================
      // USER ACTIONS (Now update Supabase!)
      // ============================================
      async function banUser(phone) {
        if (!confirm("Ban user " + phone + "? They will lose all access."))
          return;
        const success = await updateUserInSupabase(phone, { is_banned: true });
        if (success) {
          showToast("✅ User banned in cloud!", "success");
          addLog("Banned user: " + phone);
          viewUsers();
          loadStats();
        } else {
          showToast("❌ Failed to ban user", "error");
        }
      }

      async function unbanUser(phone) {
        if (!confirm("Unban user " + phone + "?")) return;
        const success = await updateUserInSupabase(phone, { is_banned: false });
        if (success) {
          showToast("✅ User unbanned in cloud!", "success");
          addLog("Unbanned user: " + phone);
          viewUsers();
          loadStats();
        } else {
          showToast("❌ Failed to unban user", "error");
        }
      }

      async function deleteUser(phone) {
        if (
          !confirm(
            "⚠️ Delete user " + phone + " permanently? This cannot be undone!",
          )
        )
          return;
        if (!supabaseInitialized) {
          showToast("Supabase not connected", "error");
          return;
        }
        try {
          const { error } = await supabase
            .from("users")
            .delete()
            .eq("phone", phone);
          if (error) throw error;
          showToast("🗑️ User deleted from cloud!", "info");
          addLog("Deleted user: " + phone);
          viewUsers();
          loadStats();
        } catch (e) {
          showToast("Error deleting user: " + e.message, "error");
        }
      }

      // ============================================
      // PAYMENT SYSTEM
      // ============================================
      function togglePaymentSystem() {
        paymentEnabled = !paymentEnabled;
        updatePaymentStatus();
        var status = paymentEnabled ? "ENABLED" : "DISABLED";
        showToast(
          "💳 Payment system " + status,
          paymentEnabled ? "success" : "warning",
        );
        addLog("Payment system " + status);
      }

      function updatePaymentStatus() {
        var statusEl = document.getElementById("paymentStatus");
        var toggleBtn = document.getElementById("paymentToggleBtn");

        if (paymentEnabled) {
          statusEl.textContent = "✅ ACTIVE";
          statusEl.style.color = "#006400";
          toggleBtn.textContent = "🔒 Toggle Payment";
          toggleBtn.className = "btn-small orange";
        } else {
          statusEl.textContent = "⛔ DISABLED (Testing)";
          statusEl.style.color = "#ff9800";
          toggleBtn.textContent = "🔓 Toggle Payment";
          toggleBtn.className = "btn-small green";
        }
      }

      // ============================================
      // 💳 PAYMENT SETTINGS FUNCTIONS
      // ============================================
      function getPaymentSettings() {
        try {
          return JSON.parse(
            localStorage.getItem("gkode_payment_settings") || "{}",
          );
        } catch {
          return {};
        }
      }

      function setPaymentSettings(settings) {
        localStorage.setItem(
          "gkode_payment_settings",
          JSON.stringify(settings),
        );
      }

      function savePaymentSettings() {
        var settings = getPaymentSettings();
        settings.commissionRate =
          parseFloat(document.getElementById("commissionRate").value) || 3;
        settings.bankName = document
          .getElementById("gkodeBankName")
          .value.trim();
        settings.accountNumber = document
          .getElementById("gkodeAccountNumber")
          .value.trim();
        setPaymentSettings(settings);
        showToast("✅ Payment settings saved!", "success");
        loadPaymentSettings();
      }

      function saveMpesaSettings() {
        var settings = getPaymentSettings();
        settings.tillNumber = document
          .getElementById("mpesaTillNumber")
          .value.trim();
        settings.paybillNumber = document
          .getElementById("mpesaPaybillNumber")
          .value.trim();
        settings.accountReference = document
          .getElementById("mpesaAccountNumber")
          .value.trim();
        setPaymentSettings(settings);
        showToast("✅ M-Pesa settings saved!", "success");
        loadPaymentSettings();
      }

      function saveUssdSettings() {
        var settings = getPaymentSettings();
        settings.ussdCode = document.getElementById("ussdCode").value.trim();
        settings.ussdMenu = document.getElementById("ussdMenu").value;
        setPaymentSettings(settings);
        showToast("✅ USSD settings saved!", "success");
        loadPaymentSettings();
      }

      function loadPaymentSettings() {
        var settings = getPaymentSettings();
        document.getElementById("commissionRate").value =
          settings.commissionRate || 3;
        document.getElementById("gkodeBankName").value =
          settings.bankName || "";
        document.getElementById("gkodeAccountNumber").value =
          settings.accountNumber || "";
        document.getElementById("mpesaTillNumber").value =
          settings.tillNumber || "";
        document.getElementById("mpesaPaybillNumber").value =
          settings.paybillNumber || "";
        document.getElementById("mpesaAccountNumber").value =
          settings.accountReference || "";
        document.getElementById("ussdCode").value =
          settings.ussdCode || "*384#";
        document.getElementById("ussdMenu").value =
          settings.ussdMenu ||
          "1. Register\n2. Login\n3. Post a Gig\n4. Find Gigs\n5. Chat with Client\n6. My Profile";
      }

      // ============================================
      // 📢 AD FUNCTIONS
      // ============================================

      function getAds() {
        try {
          return JSON.parse(localStorage.getItem("gkode_ads") || "[]");
        } catch {
          return [];
        }
      }

      function setAds(ads) {
        localStorage.setItem("gkode_ads", JSON.stringify(ads));
      }

      function showAdForm() {
        var container = document.getElementById("adFormContainer");
        if (container) {
          var isHidden = container.style.display === "none";
          container.style.display = isHidden ? "block" : "none";
          if (isHidden) {
            document.getElementById("adTitle").value = "";
            document.getElementById("adDescription").value = "";
            document.getElementById("adLink").value = "";
            document.getElementById("adActive").checked = true;
          }
        }
      }

      function saveAd() {
        var title = document.getElementById("adTitle").value.trim();
        var description = document.getElementById("adDescription").value.trim();
        var link = document.getElementById("adLink").value.trim();
        var placement = document.getElementById("adPlacement").value;
        var isActive = document.getElementById("adActive").checked;

        if (!title || !description || !link) {
          showToast("Please fill all fields.", "error");
          return;
        }

        var ads = getAds();
        var newAd = {
          id: Date.now().toString(),
          title: title,
          description: description,
          link: link,
          placement: placement,
          isActive: isActive,
          views: 0,
          clicks: 0,
          createdAt: new Date().toISOString(),
        };

        ads.push(newAd);
        setAds(ads);
        showToast("✅ Ad created!", "success");
        document.getElementById("adFormContainer").style.display = "none";
        viewAds();
      }

      function viewAds() {
        var ads = getAds();
        var container = document.getElementById("adsList");
        if (!container) return;

        if (ads.length === 0) {
          container.innerHTML =
            '<p style="color:#888;padding:10px;">No ads created yet.</p>';
          return;
        }

        var html = "<h4>📢 All Ads</h4>";
        ads.forEach(function (ad) {
          html += '<div class="ad-item">';
          html +=
            '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">';
          html += "<div><strong>" + ad.title + "</strong>";
          html +=
            ' <span style="font-size:12px;color:' +
            (ad.isActive ? "#006400" : "#cc0000") +
            ';">' +
            (ad.isActive ? "🟢 Active" : "🔴 Inactive") +
            "</span>";
          html +=
            '<div style="font-size:12px;color:#888;">📊 ' +
            (ad.views || 0) +
            " views | " +
            (ad.clicks || 0) +
            " clicks</div></div>";
          html += "<div>";
          html +=
            "<button onclick=\"toggleAd('" +
            ad.id +
            '\')" style="background:#2196F3;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;">' +
            (ad.isActive ? "⏸️" : "▶️") +
            "</button>";
          html +=
            " <button onclick=\"deleteAd('" +
            ad.id +
            '\')" style="background:#cc0000;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;">🗑️</button>';
          html += "</div></div></div>";
        });
        container.innerHTML = html;
      }

      function toggleAd(adId) {
        var ads = getAds();
        var ad = null;
        for (var i = 0; i < ads.length; i++) {
          if (ads[i].id === adId) {
            ad = ads[i];
            break;
          }
        }
        if (ad) {
          ad.isActive = !ad.isActive;
          setAds(ads);
          showToast(
            "Ad " + (ad.isActive ? "activated" : "paused") + ".",
            "success",
          );
          viewAds();
        }
      }

      function deleteAd(adId) {
        if (!confirm("Delete this ad?")) return;
        var ads = getAds().filter(function (a) {
          return a.id !== adId;
        });
        setAds(ads);
        showToast("Ad deleted.", "info");
        viewAds();
      }

      function viewAdStats() {
        var ads = getAds();
        if (ads.length === 0) {
          showToast("No ads.", "info");
          return;
        }
        var totalViews = 0,
          totalClicks = 0,
          activeAds = 0;
        ads.forEach(function (ad) {
          totalViews += ad.views || 0;
          totalClicks += ad.clicks || 0;
          if (ad.isActive) activeAds++;
        });
        var msg =
          "📊 AD STATS\n\n📢 Total Ads: " +
          ads.length +
          "\n🟢 Active: " +
          activeAds +
          "\n👁️ Views: " +
          totalViews +
          "\n👆 Clicks: " +
          totalClicks +
          "\n📈 CTR: " +
          (totalViews > 0 ? ((totalClicks / totalViews) * 100).toFixed(1) : 0) +
          "%";
        alert(msg);
      }

      // ============================================
      // VIEW GIGS
      // ============================================
      function viewGigs() {
        var gigs = getGigs();
        displayGigs(gigs, "📋 All Gigs");
      }

      function viewOpenGigs() {
        var gigs = getGigs().filter(function (g) {
          return g.status === "Open";
        });
        if (gigs.length === 0) {
          showToast("No open gigs", "info");
          return;
        }
        displayGigs(gigs, "🟢 Open Gigs");
      }

      function viewCompletedGigs() {
        var gigs = getGigs().filter(function (g) {
          return g.status === "Completed";
        });
        if (gigs.length === 0) {
          showToast("No completed gigs", "info");
          return;
        }
        displayGigs(gigs, "✅ Completed Gigs");

      function displayGigs(gigs, title) {
        var output = document.getElementById("output");
        if (gigs.length === 0) {
          output.innerHTML = "<p>No gigs found.</p>";
          return;
        }

        var html = "<h3>" + title + " (" + gigs.length + ")</h3>";
        gigs.forEach(function (g) {
          html += '<div class="user-item">';
          html +=
            "<div><strong>" + g.title + "</strong> — " + g.status + "</div>";
          html += "<div>👤 " + g.client + " | 🛠️ " + g.skill + "</div>";
          html +=
            "<div>📍 " +
            g.location +
            " | 💰 Ksh " +
            g.budgetMin +
            " - " +
            g.budgetMax +
            "</div>";
          if (g.worker) html += "<div>👷 Worker: " + g.worker + "</div>";
          html +=
            '<div style="font-size:11px; color:#888;">📅 ' +
            new Date(g.createdAt).toLocaleString() +
            "</div>";
          html += '<div style="margin-top:5px;">';
          html +=
            '<button class="btn-small red" onclick="deleteGig(\'' +
            g.id +
            "')\">🗑️ Delete</button>";
          html +=
            ' <button class="btn-small blue" onclick="viewGigDetails(\'' +
            g.id +
            "')\">📋 Details</button>";
          html += "</div></div>";
        });
        output.innerHTML = html;
      }

      function viewGigDetails(id) {
        var gigs = getGigs();
        var gig = null;
        for (var i = 0; i < gigs.length; i++) {
          if (gigs[i].id === id) {
            gig = gigs[i];
            break;
          }
        }
        if (!gig) {
          showToast("Gig not found", "error");
          return;
        }

        var html = "<h3>📋 Gig Details</h3>";
        html += '<div class="admin-card">';
        html += "<p><strong>Title:</strong> " + gig.title + "</p>";
        html += "<p><strong>Skill:</strong> " + gig.skill + "</p>";
        html += "<p><strong>Location:</strong> " + gig.location + "</p>";
        html +=
          "<p><strong>Budget:</strong> Ksh " +
          gig.budgetMin +
          " - " +
          gig.budgetMax +
          "</p>";
        html += "<p><strong>Urgency:</strong> " + gig.urgency + "</p>";
        html += "<p><strong>Status:</strong> " + gig.status + "</p>";
        html +=
          "<p><strong>Client:</strong> " +
          gig.client +
          " (" +
          gig.clientPhone +
          ")</p>";
        if (gig.worker)
          html +=
            "<p><strong>Worker:</strong> " +
            gig.worker +
            " (" +
            gig.workerPhone +
            ")</p>";
        html +=
          "<p><strong>Description:</strong> " +
          (gig.description || "None") +
          "</p>";
        if (gig.gpsLat && gig.gpsLon) {
          html +=
            "<p><strong>GPS:</strong> " +
            gig.gpsLat +
            ", " +
            gig.gpsLon +
            "</p>";
        }
        html +=
          "<p><strong>Posted:</strong> " +
          new Date(gig.createdAt).toLocaleString() +
          "</p>";
        html += "</div>";
        document.getElementById("output").innerHTML = html;
      }

      function deleteGig(id) {
        if (!confirm("Delete this gig?")) return;
        var gigs = getGigs().filter(function (g) {
          return g.id !== id;
        });
        localStorage.setItem("gkode_gigs", JSON.stringify(gigs));
        showToast("🗑️ Gig deleted", "info");
        addLog("Deleted gig: " + id);
        viewGigs();
        loadStats();
      }

      // ============================================
      // VIEW COMPLAINTS
      // ============================================
      function viewComplaints() {
        var complaints = getComplaints();
        displayComplaints(complaints, "🚩 All Complaints");
      }

      function viewPendingComplaints() {
        var complaints = getComplaints().filter(function (c) {
          return !c.resolved;
        });
        if (complaints.length === 0) {
          showToast("No pending complaints", "info");
          return;
        }
        displayComplaints(complaints, "🟡 Pending Complaints");
      }

      function viewResolvedComplaints() {
        var complaints = getComplaints().filter(function (c) {
          return c.resolved;
        });
        if (complaints.length === 0) {
          showToast("No resolved complaints", "info");
          return;
        }
        displayComplaints(complaints, "✅ Resolved Complaints");
      }

      function displayComplaints(complaints, title) {
        var output = document.getElementById("output");
        if (complaints.length === 0) {
          output.innerHTML = "<p>No complaints found.</p>";
          return;
        }

        var html = "<h3>" + title + " (" + complaints.length + ")</h3>";
        complaints.forEach(function (c) {
          var status = c.resolved ? "✅ Resolved" : "🟡 Pending";
          var statusClass = c.resolved ? "status-resolved" : "status-pending";
          html += '<div class="user-item">';
          html +=
            "<div><strong>" +
            c.reason +
            '</strong> — <span class="' +
            statusClass +
            '">' +
            status +
            "</span></div>";
          html += "<div>📝 " + c.details + "</div>";
          html +=
            "<div>👤 User: " +
            c.userId +
            " | Reporter: " +
            (c.reporterId || "Unknown") +
            "</div>";
          html +=
            '<div style="font-size:11px; color:#888;">📅 ' +
            new Date(c.date).toLocaleString() +
            "</div>";
          if (!c.resolved) {
            html +=
              '<button class="btn-small green" onclick="resolveComplaint(\'' +
              c.id +
              "')\">✅ Resolve</button>";
          }
          html +=
            ' <button class="btn-small red" onclick="deleteComplaint(\'' +
            c.id +
            "')\">🗑️ Delete</button>";
          html += "</div>";
        });
        output.innerHTML = html;
      }

      function resolveComplaint(id) {
        var complaints = getComplaints().map(function (c) {
          if (c.id === id) c.resolved = true;
          return c;
        });
        localStorage.setItem("gkode_complaints", JSON.stringify(complaints));
        showToast("✅ Complaint resolved", "success");
        addLog("Resolved complaint: " + id);
        viewComplaints();
        loadStats();
      }

      function deleteComplaint(id) {
        if (!confirm("Delete this complaint?")) return;
        var complaints = getComplaints().filter(function (c) {
          return c.id !== id;
        });
        localStorage.setItem("gkode_complaints", JSON.stringify(complaints));
        showToast("🗑️ Complaint deleted", "info");
        viewComplaints();
        loadStats();
      }

      // ============================================
      // VIEW STRIKES
      // ============================================
      async function viewStrikes() {
        const users = await getUsersFromSupabase();
        const withStrikes = users.filter(function (u) {
          return u.strikes > 0;
        });
        var output = document.getElementById("output");

        if (withStrikes.length === 0) {
          output.innerHTML = "<p>No users with strikes.</p>";
          return;
        }

        var html = "<h3>⚠️ Strikes Report</h3>";
        withStrikes.sort(function (a, b) {
          return b.strikes - a.strikes;
        });
        withStrikes.forEach(function (u) {
          var warning =
            u.strikes >= 5
              ? "🔴 WARNING: Near ban!"
              : u.strikes >= 3
                ? "🟡 Warning"
                : "🟢 Ok";
          html +=
            '<div class="user-item"><div class="name">' +
            (u.full_name || "Unknown") +
            "</div>";
          html += '<div class="phone">📞 ' + (u.phone || "N/A") + "</div>";
          html += "<div>⚠️ " + u.strikes + " strikes — " + warning + "</div>";
          html +=
            "<div>" + (u.is_banned ? "🚫 BANNED" : "Active") + "</div></div>";
        });
        output.innerHTML = html;
      }

      // ============================================
      // VIEW PAYMENTS & REVENUE
      // ============================================
      function viewPayments() {
        var payments = getPayments();
        var output = document.getElementById("output");

        if (payments.length === 0) {
          output.innerHTML = "<p>No payments recorded.</p>";

        }

        payments.forEach(function (p) {

          html += "<div>📞 " + p.phone + "</div>";
          html += "<div>💰 Ksh " + p.amount + " | Code: " + p.code + "</div>";
          html +=
            "<div>" +
            (p.verified ? "✅ Verified" : "❌ Pending") +
            " | " +
            (p.type || "User Fee") +
            "</div>";
          html +=
            '<div style="font-size:11px; color:#888;">📅 ' +
            new Date(p.date).toLocaleString() +
            "</div>";
          html += "</div>";

      }

      function viewRevenueReport() {
        var payments = getPayments();
        var users = getUsersLocal();
        var gigs = getGigs();

        var totalRevenue = 0;
        var userFees = 0;
        var commission = 0;
        var totalOrders = 0;

        payments.forEach(function (p) {
          if (p.verified) {
            totalRevenue += p.amount;
            if (p.type === "user_fee" || !p.type) userFees += p.amount;
            if (p.type === "commission") commission += p.amount;
          }
        });

        var paidUsers = users.filter(function (u) {
          return u.isPaid;
        }).length;
        var completedGigs = gigs.filter(function (g) {
          return g.status === "Completed";
        }).length;
        var orders = getOrders();

        var html = "<h3>📊 Revenue Report</h3>";
        html += '<div class="admin-card">';
        html +=
          "<p><strong>Total Revenue:</strong> Ksh " +
          totalRevenue.toLocaleString() +
          "</p>";
        html +=
          "<p><strong>User Fees:</strong> Ksh " +
          userFees.toLocaleString() +
          "</p>";
        html +=
          "<p><strong>Commission (3%):</strong> Ksh " +
          commission.toLocaleString() +
          "</p>";
        html +=
          "<p><strong>Paid Users:</strong> " +
          paidUsers +
          "/" +
          users.length +
          "</p>";
        html += "<p><strong>Completed Gigs:</strong> " + completedGigs + "</p>";
        html += "<p><strong>Total Orders:</strong> " + orders.length + "</p>";
        html +=
          "<p><strong>Potential Revenue:</strong> Ksh " +
          ((users.length - paidUsers) * 300 + orders.length * 50) +
          "</p>";
        html += "</div>";
        document.getElementById("output").innerHTML = html;
      }

      // ============================================
      // SYSTEM TOOLS
      // ============================================
      function downloadBackup() {
        var data = {
          exportedAt: new Date().toISOString(),
          app: "G-KODE",
          version: "3.0",
          users: getUsersLocal(),
          gigs: getGigs(),
          complaints: getComplaints(),
          payments: getPayments(),
          businesses: getBusinesses(),
          products: getProducts(),
          orders: getOrders(),
          logs: getLogs(),
          systemState: {
            paymentEnabled: paymentEnabled,
          },
        };

        var blob = new Blob([JSON.stringify(data, null, 2)], {
          type: "application/json",
        });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download =
          "gkode-backup-" + new Date().toISOString().split("T")[0] + ".json";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        var backups = getBackups();
        backups.push({
          id: Date.now().toString(),
          timestamp: new Date().toISOString(),
          size: blob.size,
        });
        localStorage.setItem("gkode_backups", JSON.stringify(backups));

        showToast("✅ Backup downloaded and saved", "success");
        addLog("Backup created");
      }

      function viewBackups() {
        var backups = getBackups();
        var output = document.getElementById("output");

        if (backups.length === 0) {
          output.innerHTML = "<p>No backups found.</p>";
          return;
        }

        var html = "<h3>📂 Backups (" + backups.length + ")</h3>";
        backups
          .slice()
          .reverse()
          .forEach(function (b) {
            html += '<div class="user-item">';
            html +=
              "<div>📅 " + new Date(b.timestamp).toLocaleString() + "</div>";
            html +=
              "<div>📦 " +
              (b.size ? (b.size / 1024).toFixed(2) + " KB" : "Unknown size") +
              "</div>";
            html += "<div>🆔 " + b.id.slice(-6) + "</div></div>";
          });
        output.innerHTML = html;
      }

      function viewLogs() {
        var logs = getLogs();
        var output = document.getElementById("output");

        if (logs.length === 0) {
          output.innerHTML = "<p>No logs found.</p>";
          return;
        }

        var html = "<h3>📜 Activity Logs (" + logs.length + ")</h3>";
        logs
          .slice()
          .reverse()
          .forEach(function (l) {
            html += '<div class="user-item" style="font-size:12px;">';
            html +=
              "<div><strong>" +
              (l.action || l.type || "Action") +
              "</strong></div>";
            html +=
              "<div>👤 " +
              (l.user || "Admin") +
              " | 📅 " +
              new Date(l.time || l.timestamp).toLocaleString() +
              "</div>";
            html += "</div>";
          });
        output.innerHTML = html;
      }

      function viewSystemHealth() {
        var users = getUsersLocal();
        var gigs = getGigs();
        var complaints = getComplaints();
        var payments = getPayments();

        var totalRevenue = 0;
        payments.forEach(function (p) {
          if (p.verified) totalRevenue += p.amount;
        });

        var storageSize = 0;
        for (var key in localStorage) {
          if (localStorage.hasOwnProperty(key)) {
            storageSize += localStorage[key].length;
          }
        }

        var html = "<h3>🏥 System Health</h3>";
        html += '<div class="admin-card">';
        html += "<p>👥 Users: <strong>" + users.length + "</strong></p>";
        html += "<p>📋 Gigs: <strong>" + gigs.length + "</strong></p>";
        html +=
          "<p>🚩 Complaints: <strong>" + complaints.length + "</strong></p>";
        html +=
          "<p>💰 Revenue: <strong>Ksh " +
          totalRevenue.toLocaleString() +
          "</strong></p>";
        html +=
          "<p>💾 Storage: <strong>" +
          (storageSize / 1024).toFixed(2) +
          " KB</strong></p>";
        html +=
          "<p>💳 Payment System: <strong>" +
          (paymentEnabled ? "✅ Active" : "⛔ Disabled") +
          "</strong></p>";
        html +=
          "<p>📅 Last Check: <strong>" +
          new Date().toLocaleString() +
          "</strong></p>";
        html += '<p style="color:#006400;">✅ System is healthy</p>';
        html += "</div>";
        document.getElementById("output").innerHTML = html;
      }

      function exportUsersCSV() {
        var users = getUsersLocal();
        if (users.length === 0) {
          showToast("No users to export", "error");
          return;
        }

        var csv =
          "Name,Phone,ID,Location,Profession,Rating,Strikes,Paid,Banned\n";
        users.forEach(function (u) {
          csv +=
            u.name +
            "," +
            u.phone +
            "," +
            u.id +
            "," +
            u.location +
            "," +
            u.profession +
            "," +
            (u.rating || 0) +
            "," +
            (u.strikes || 0) +
            "," +
            (u.isPaid ? "Yes" : "No") +
            "," +
            (u.isBanned ? "Yes" : "No") +
            "\n";
        });

        var blob = new Blob([csv], { type: "text/csv" });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download =
          "gkode-users-" + new Date().toISOString().split("T")[0] + ".csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        showToast("✅ Users exported", "success");
      }

      // ============================================
      // DANGER ZONE
      // ============================================

          !confirm(

        )
          return;
        if (!confirm("FINAL WARNING: This cannot be undone! Continue?")) return;

        downloadBackup();
        localStorage.removeItem("gkode_users");
        localStorage.removeItem("gkode_gigs");
        localStorage.removeItem("gkode_complaints");
        localStorage.removeItem("gkode_payments");
        localStorage.removeItem("gkode_companies");
        localStorage.removeItem("gkode_products");
        localStorage.removeItem("gkode_orders");
        localStorage.removeItem("gkode_adminLogs");
        localStorage.removeItem("gkode_professions");
        localStorage.removeItem("gkode_categories");
        localStorage.removeItem("gkode_user");

      function resetApp() {
        if (
          !confirm("🔄 Reset entire app? This will clear all data and reload.")
        )
          return;
        if (!confirm("Final warning: This cannot be undone!")) return;

        downloadBackup();
        localStorage.clear();

        showToast("🔄 App reset. Refreshing...", "info");
        setTimeout(function () {
          window.location.href = "index.html";
        }, 2000);
      }

      // ============================================
      // ADD LOG
      // ============================================
      function addLog(action) {
        var logs = getLogs();
        logs.push({
          type: "ADMIN_ACTION",
          action: action,
          user: "Admin",
          time: new Date().toISOString(),
        });
        localStorage.setItem("gkode_adminLogs", JSON.stringify(logs));
      }
